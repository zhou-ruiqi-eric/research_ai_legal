name: Auto Update Folder Tree

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  update-tree:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tree command
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate clean tree (no dates, no .md extensions)
        run: |
          tree --dirsfirst \
               -I '.obsidian|.github|attachments|node_modules|.git|*.log|*.tmp|TREE.md' \
               -L 6 \
               --noreport | sed 's/\.md$//' > TREE.md

      - name: Replace tree in README.md
        run: python3 .github/scripts/replace_tree.py

      - name: Clean up temporary TREE.md
        run: rm -f TREE.md

      - name: Commit & Push updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "chore: auto update folder tree 🌳"
          file_pattern: README.md