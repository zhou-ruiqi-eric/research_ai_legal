name: Auto Update Folder Tree (Only Last Modified Date)

on:
  push:
    branches: [ main, master ]     # 如果你的默认分支是 main 或 master，请保持一致
  workflow_dispatch:               # 允许手动点击运行

jobs:
  update-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tree command
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate tree（只显示最后修改日期 YYYY-MM-DD + 忽略 .obsidian 和 .github）
        run: |
          tree --dirsfirst \
               -I '.obsidian|.github|attachments|node_modules|.git|*.log|*.tmp' \
               -D \
               --timefmt '%Y-%m-%d' \
               -L 6 > TREE.md

      - name: Insert tree into README.md
        run: |
          sed -i '/### Auto-Generated Tree Structure/,/```bash/,/```/c\### Auto-Generated Tree Structure\n\n```bash\n'"$(cat TREE.md)"'\n```' README.md

      - name: Commit & Push updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto update folder tree (last modified date only) 🌳"
          file_pattern: README.md