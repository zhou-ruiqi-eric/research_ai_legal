name: Auto Update Folder Tree (Only Last Modified Date)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  update-tree:
    runs-on: ubuntu-latest
    
    # ←←← 新增这一段，赋予 push 权限
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tree command
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate tree（只显示最后修改日期 YYYY-MM-DD）
        run: |
          tree --dirsfirst \
               -I '.obsidian|.github|attachments|node_modules|.git|*.log|*.tmp' \
               -D \
               --timefmt '%Y-%m-%d' \
               -L 6 > TREE.md

      - name: Replace tree in README.md
        run: python3 .github/scripts/replace_tree.py

      - name: Commit & Push updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}     # ←←← 新增这一行
          commit_message: "chore: auto update folder tree (last modified date) 🌳"
          file_pattern: README.md